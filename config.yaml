# Global configuration for the AutoInterp Agent Framework

# Provider-specific configurations
providers:
  anthropic:
    api_version: "2023-06-01"
  openai:
    api_version: "2020-10-01"  # Current REST API version
    organization_id: null       # Must be set via env var OPENAI_ORGANIZATION_ID
  openrouter:
    base_url: "https://openrouter.ai/api/v1"

# Interactive mode — pause after each pipeline stage for user review and feedback
interactive_mode: false

# Framework settings
framework:
  name: "AutoInterp Agent Framework"
  version: "0.1.0"
  log_level: "INFO"
  log_file: "autointerp.log"
  log_message_limit: 500  # Maximum length for log messages
  execute_full_workflow: true  # Whether to run the complete workflow automatically

# Task configuration
task:
  description: ""  # Task description will be provided by user or auto-generated

literature_search:
  enabled: true
  n_papers: 3   # number of papers to sample from graph for question generation
  graph: null   # null = use arxiv_interp_graph/output/graph_state.json
  seed_id: null
  seed: null   # null = different papers each run; set e.g. 42 for reproducibility
  use_agent: true       # use CLI agent (claude/codex) for question generation; false = LLM API call
  agent_timeout: 900    # seconds to wait for agent CLI subprocess

# Model to analyze
model:
  name: "meta-llama/Llama-3.2-1B-Instruct"  # HuggingFace model ID
  tokenizer: "meta-llama/Llama-3.2-1B-Instruct"
  cache_dir: "hf_models"  # Local cache directory


# Analysis settings
analysis:
  use_agent: true            # Use CLI agent (claude/codex) for analysis; false = legacy pipeline
  agent_timeout: 1800        # Per-iteration timeout in seconds for agent subprocess
  execution:
    timeout: 180  # seconds
    max_memory: 4000  # MB
    sandbox: true
  executor_type: "sandbox"
  output_format: "json"
  timeout_per_analysis: 300
  max_iterations: 6      # Maximum number of analysis cycles per question
  confidence_threshold: 0.85  # Continue analysis if confidence_threshold > confidence

# Execution settings
execution:
  mode: "sandbox"
  timeout: 300
  max_retries: 5
  max_memory_mb: 4096
  force_clean_venv: false  # Force clean virtual environment on startup (disabled when using existing venv)
  use_system_python: false  # Set to true to use system Python instead of virtual environment
  use_existing_venv: false  # Set to true to use an existing virtual environment (requires existing_venv_path)
  existing_venv_path: ""  # Path to existing virtual environment (or use --venv CLI flag)
  fail_on_max_retries: false  # If true, shutdown entire system when max_retries exceeded; if false, continue to next analysis
  docker:
    image: "python:3.10-slim"  # Default container image for sandbox execution
    use_gpu: false             # Set true to pass host GPUs into the container (requires nvidia-container-runtime)
    cache_dir: "~/.autointerp/docker_cache"  # Persistent cache for installed packages
    extra_args: []             # Additional docker run arguments
    env: []                    # Additional environment variables to pass through (e.g., ["CUSTOM_ENV"])

# Visualization settings
visualization:
  use_agent: true             # Use CLI agent (claude/codex) for visualization; false = legacy pipeline
  agent_timeout: 900          # Subprocess timeout in seconds for visualization agent
  default_format: "png"
  dpi: 300
  save_dir: "projects/{project_id}/visualizations"
  attention_maps: true
  attention_flow: true
  neuron_activations: true
  comparative_analysis: true

# Reporting settings
reporting:
  default_format: "markdown"  # Options: markdown, jupyter, html, pdf
  save_dir: "projects/{project_id}/reports"
  use_agent: true             # Use CLI agent (claude/codex) for report generation; false = legacy pipeline
  agent_timeout: 900          # Subprocess timeout in seconds for agent report generation

# AutoCritique settings — automated peer review after report generation
autocritique:
  enabled: true               # Run automated peer review after report generation
  use_agent: true             # Use CLI agent (claude/codex) for autocritique
  agent_timeout: 600          # Subprocess timeout in seconds for autocritique agent
  revision_timeout: 1800      # Per-recommendation timeout for revision agent (does analysis work)
  report_revision_timeout: 900  # Timeout for report revision agent (incorporates revisions into report)
  max_revision_rounds: 2      # Max autocritique→revision→report revision cycles (0 = no revisions)

# Computational resources
resources:
  max_gpu_memory: 8000  # MB
  batch_size: 8
  precision: "fp16"  # Options: fp32, fp16, bf16

# Default paths
paths:
  data: "data"
  models: "models"
  projects: "projects"
  create_missing: true
  cleanup_old: false


# Default output directories - all should use project-specific paths
output_directories:
  visualizations: "projects/{project_id}/visualizations"
  reports: "projects/{project_id}/reports"
  evaluation_results: "projects/{project_id}/evaluation_results"



# UI settings
ui:
  rich_terminal: true        # Use Rich library for structured terminal output
  html_dashboard: true       # Generate auto-refreshing HTML dashboard
  dashboard_refresh: 5       # Dashboard auto-refresh interval in seconds
  auto_open_browser: true    # Open dashboard in browser on pipeline start

# Default LLM configuration
llm:
  provider: "anthropic"
  model: "claude-sonnet-4-6"
  temperature: 0.7
  max_tokens: 3000
  timeout: 180

# Agent-specific configurations
agents:
  # Question Generation Agent
  question_generator:
    llm:
      provider: "anthropic"
      model: "claude-sonnet-4-6"
      temperature: 0.8
      max_tokens: 1000
      timeout: 90

  # Question Prioritization Agent
  question_prioritizer:
    llm:
      provider: "anthropic"
      model: "claude-sonnet-4-6"
      temperature: 0.667
      max_tokens: 1000
      timeout: 180

  # Analysis Planning Agent
  analysis_planner:
    llm:
      provider: "anthropic"
      model: "claude-sonnet-4-6"
      temperature: 0.7
      max_tokens: 3000
      timeout: 180

  # Analysis Generation Agent
  analysis_generator:
    llm:
      provider: "anthropic"
      model: "claude-sonnet-4-6"
      temperature: 0.7
      max_tokens: 12000
      timeout: 180

  # Visualization Planning Agent
  visualization_planner:
    llm:
      provider: "anthropic"
      model: "claude-sonnet-4-6"
      temperature: 0.7
      max_tokens: 3000
      timeout: 180

  # Visualization Generation Agent
  visualization_generator:
    llm:
      provider: "anthropic"
      model: "claude-sonnet-4-6"
      temperature: 0.7
      max_tokens: 12000
      timeout: 180

  # Analysis Evaluation Agent
  evaluator:
    llm:
      provider: "anthropic"
      model: "claude-sonnet-4-6"
      temperature: 0.7
      max_tokens: 31000
      timeout: 180

  # Visualization Evaluation Agent
  visualization_evaluator:
    llm:
      provider: "anthropic"
      model: "claude-sonnet-4-6"
      temperature: 0.3
      max_tokens: 2000
      timeout: 180

  # Report Generation Agent
  reporter:
    llm:
      provider: "anthropic"
      model: "claude-sonnet-4-6"
      temperature: 0.7
      max_tokens: 8000
      timeout: 180

  # Analysis Agent (CLI subprocess — claude or codex)
  analysis_agent:
    timeout: 1800

  # Title Generation Agent
  title_generator:
    llm:
      provider: "anthropic"
      model: "claude-sonnet-4-6"
      temperature: 0.7
      max_tokens: 200
      timeout: 60

# Provider configurations are now dynamically applied at runtime
# Use the interactive provider selection menu or set --config with overrides
