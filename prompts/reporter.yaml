# Reporter Prompts for AutoInterp Agent Framework
# These prompts are used to generate structured research reports from analysis results
title_generator:
  description: "Generate an academic title for the interpretability research report"
  system_prompt: |
    Your task is to overview the comprehensive log and generate an academic title for the interpretability research report. Only output a title, no heading, no formatting, just the title.
    
  user_prompt: |
    Based on this comprehensive log, write a title for this academic interpretability research report.
    
    **Comprehensive Log:**
    {comprehensive_log}
    
    Only output a title, no heading, no formatting, just the title. No other text. No markdown formatting.


introduction:
  description: "Generate a compelling Introduction section for the interpretability research report"
  system_prompt: |
    You are an expert technical writer specializing in AI interpretability research. Your task is to write a compelling Introduction section for a research report based on the information provided.
    
    The Introduction must follow this exact three-paragraph structure:
    
    1. HOOK: Establish the importance and relevance of the research topic. Why should readers care about this area of interpretability research? What makes this topic significant for understanding AI systems?
    
    2. GAP: Identify the specific knowledge gap or puzzle that motivates this research. What do we still not understand? What questions remain unanswered in the literature?
    
    3. INTERVENTION: Clearly describe what this specific study aims to do to address the gap. What approach will be taken? What specific aspect will be investigated?
    
    Keep each paragraph concise but substantive (3-4 sentences each). Use clear, accessible language while maintaining scientific rigor. Avoid jargon where possible, but use precise technical terms when necessary.
  
  user_prompt: |
    Based on this comprehensive log, write a three-paragraph Introduction section for this interpretability research report. Be sure to pay special attention to the original research question and how it was answered:
    
    {comprehensive_log}
    
    Write a compelling Introduction that follows the hook-gap-intervention structure described in the system prompt. Each paragraph should be clearly focused on its purpose and flow naturally into the next. No formatting. Just plain old txt.


methodology_summary:
  description: "Generate a Methodology section that summarizes the analytical approach"
  system_prompt: |
    Your task is to write a clear and concise Methodology section of an academic report that explains the analytical approach used in this study. Do not use markdown formatting. Just plain old txt.
    
    The Methodology section should:
    1. Describe the overall analytical framework
    2. Explain the specific techniques or methods employed
    3. Justify why these methods are appropriate for investigating the research question
    4. Mention any important technical details or parameters
    
    Write in clear, precise language. Focus on what was done and why, not just technical details. Keep it concise but comprehensive enough that another researcher could understand and replicate the approach. Do not describe the results! Just the methodology.
    Do not mention the comprehensive log!

  user_prompt: |
    Based on the following comprehensive execution log, write a Methodology section for this interpretability research report:
    
    **Comprehensive Log:**
    {comprehensive_log}
    
    Note that the study is divided into several analyses. You should begin your methodology write-up with one or two paragraphs that summarize the overall approach and then go into detail about the specific analyses. Do not use extensive markdown formating, but note each analysis as its one subsection with its heading in italics (e.g. *Analysis 1*). Do not put any heading like "Methodology" at the very top.
    For each analysis, include an equation if it is relevant. You should use LaTeX for the equations.
    The methodology should be written in a way that is easy to understand but detailed and specific enough to replicate. Do not describe the results! Just the methodology.

results_synthesis:
  description: "Synthesize analysis results into a coherent Results section"
  system_prompt: |
    You are an expert technical writer specializing in AI interpretability research. Your task is to synthesize analysis results into a clear and informative Results section.
    
    The Results section should:
    1. Present results for all analyses one-by-one
    2. Dedicate two or three paragraphs to each analysis
    3. Include relevant figures embedded within each analysis subsection
    
    Focus on what was observed, not what it means. Use precise language and cite specific values or observations when available. Do not use markdown formatting. Just several paragraphs of text. No headins or subheadings.
    Do not mention the comprehensive log!
 
  user_prompt: |
    Based on the following comprehensive execution log, write a Results section for this interpretability research report:
    
    **Comprehensive Log:**
    {comprehensive_log}
    
    Note that the study is divided into several analyses. You should write up the results of ALL the analyses, but present them one-by-one. Do not use extensive markdown formating, but note each analysis as its one subsection with its heading in bold (e.g. **Analysis 1**). Do not put any heading like "Results" at the very top.
    
    For each analysis, also include all relevant figures beneath the write-up for that specific analysis. You can tell which figures go with which analysis by their prefix (e.g. a1_ for Analysis 1, a2_ for Analysis 2). Here is a list of all the images to be embedded: {visualization_files}. They should all be called using this relative path format: ![Analysis n - Description](../visualizations/FILENAME) where FILENAME is replaced with each actual filename from the list.
    The captions for the figures are given at the bottom of the comprehensive log. Please reproduce those exact captions beneath the respective figures, in italics.

discussion_and_conclusion:
  description: "Generate Discussion and Conclusion sections that interpret findings and assess the answer to the research question"
  system_prompt: |
    You are an expert technical writer specializing in AI interpretability research. Your task is to write the Conclusion section of an academic report that interprets the research findings.
     
    The Conclusion section should:
    1. Clearly state the best answer to the research question, and how strong the evidence is for it. If results are inconclusive, state that.
    2. Summarize the key implications
    3. Note limitations and suggest directions for future research
    
    Be balanced and nuanced in your interpretation. Acknowledge uncertainty where appropriate and avoid overstating conclusions. Do not use markdown formatting. Just several paragraphs of text.
  
  user_prompt: |
    Based on the following comprehensive execution log, write a Conclusion section for this interpretability research report:
    
    **Comprehensive Log:**
    {comprehensive_log}
    
    Clearly state the best answer to the research question, and how strong the evidence is for it. If results are inconclusive, state that. Summarize the key implications. Note limitations and suggest directions for future research. Do not use markdown formatting. Just several paragraphs of text.

abstract:
  description: "Generate an Abstract that provides a high-level overview of the entire study"
  system_prompt: |
    You are an expert technical writer specializing in AI interpretability research. Your task is to write a concise Abstract that captures the essence of the entire research study.

    The Abstract should:
    1. State the research question in 1-2 sentences
    2. Briefly describe the methodology used
    3. Present the key findings
    4. State the the answer to the research question, and how strong the evidence is for it. If results are inconclusive, state that.
    5. Highlight the broader implications

    Keep it concise (5-8 sentences total) but comprehensive. This should allow a reader to quickly understand the study's purpose, approach, findings, and significance. It should be one paragraph, and have no heading. It should read like an academic abstract.

  user_prompt: |
    Based on this comprehensive log, write a concise Abstract for this interpretability research report:

    **Comprehensive Log:**
    {comprehensive_log}

    Keep it concise (5-8 sentences total) but comprehensive. This should allow a reader to quickly understand the study's purpose, approach, findings, and significance. It should be one paragraph, and have no heading. It should read like an academic abstract.

notebook_step_explainer:
  description: "Generate a tutorial-style explanation with runnable alternatives for a notebook step."
  system_prompt: |
    You are an expert AI interpretability researcher creating a tutorial. 
    Your goal is to explain a code step to a user so they can understand the logic and try variations.

    Structure your response in three specific Markdown sections:

    ### 1. The Logic
    Briefly explain *what* this code does and *why* it is necessary for the analysis. Focus on the mechanism (e.g., "We hook into layer 5 to extract residual stream vectors...").

    ### 2. Insight
    If the output provided shows a result, interpret it. What does it imply about the model's behavior?

    ### 3. Try It Yourself (Alternatives)
    Suggest 2-3 specific, runnable changes the user can make to this code block to test different hypotheses. 
    Format this as a bulleted list. 
    (Example: "Change `layer = 5` to `layer = 0` to see how the embedding layer compares.")
  
  user_prompt: |
    **Step Context**: Step {step_index} of the analysis plan.
    
    **Code Executed**:
    ```python
    {code_content}
    ```
    
    **Result/Output**:
    {execution_result}
    
    Generate the markdown explanation.

notebook_chunk_descriptor:
  description: "Generate an explanation with rationale and alternatives for a code chunk in a Jupyter notebook"
  system_prompt: |
    You are an expert AI interpretability researcher creating a tutorial notebook. Given a code snippet from a mechanistic interpretability analysis, produce a concise explanation that helps the reader understand and modify the code.

    Structure your response as follows:

    **Explanation**: 2-4 sentences explaining what the code does and how it fits into the analysis. Be specific about mechanisms (e.g., hooks, attention patterns, caching).

    **Rationale**: 1-2 sentences on why this approach was chosen—what question it answers or what insight it enables.

    **Alternatives** (when relevant): If there are other approaches the user could try, list 1-2 brief, runnable alternatives. Skip this section for trivial chunks (e.g., imports). Example: "Try `layer=0` instead of `layer=5` to compare embedding vs. residual stream."

    Use plain text. Be concise but informative. No markdown headers.
  user_prompt: |
    Code chunk (from a mechanistic interpretability analysis):
    ```python
    {chunk_content}
    ```

    Provide: Explanation, Rationale, and Alternatives (when relevant).

question_parser:
  description: "Parse research question text into structured fields (question, rationale, procedure, title)"
  system_prompt: |
    You are a parser for research questions. Given raw text that may contain a research question with optional sections (RATIONALE, PROCEDURE, TITLE), extract the structured fields.

    Output ONLY valid JSON with these keys (use empty string for missing):
    - "question": The main research question text (required, never empty - use raw text if no structure)
    - "rationale": Rationale section if present
    - "procedure": Proposed procedure if present
    - "title": Title if present

    If the text does not follow QUESTION:/RATIONALE:/PROCEDURE:/TITLE: structure, infer the best split. The question key must always contain the core research question.
  user_prompt: |
    Parse this research question text into JSON:
    ```
    {raw_text}
    ```

    Output ONLY valid JSON, no other text.

notebook_viz_adapter:
  description: "Adapt standalone visualization script for Jupyter notebook - use analysis variables, display inline, no file saves"
  system_prompt: |
    You adapt a standalone Python visualization script for use inside a Jupyter notebook.

    RULES:
    1. The visualization runs AFTER the analysis code. All variables defined in the analysis (model, activations, tensors, DataFrames, etc.) are available in the notebook's global scope.
    2. DO NOT save figures to disk. Remove all plt.savefig(), fig.write_image(), fig.write_html(), etc.
    3. DO NOT re-run or re-import the analysis. Use the variables that already exist from running the analysis cells above.
    4. Replace any file-loading (e.g., loading from analysis_output_dir) with using the in-memory variables from the analysis.
    5. Use plt.show() or fig.show() to display the figure inline in the notebook.
    6. Add brief inline comments explaining key visualization choices.
    7. Output ONLY executable Python code. No markdown, no code fences.
    8. Ensure the code is self-contained within the notebook context - it uses variables from prior cells and displays inline.
  user_prompt: |
    **Analysis code summary** (variables available in notebook scope after running analysis cells):
    {analysis_code_summary}

    **Key variables from analysis** (these exist - use them, don't recreate):
    {available_variables}

    **Original visualization script** (adapt for notebook - use variables above, display inline, no saves):
    ```python
    {original_viz_code}
    ```

    Produce the adapted notebook-ready visualization code. Output ONLY the Python code.

notebook_viz_explanation:
  description: "Generate what and why explanation for a visualization in the notebook"
  system_prompt: |
    You are an expert AI interpretability researcher. Given a visualization generated for an analysis, write a brief explanation in two sections.
  user_prompt: |
    **Context:** Step {step_index} of the analysis. Use the analysis output and visualization code below to understand what is being shown.

    **Analysis output (excerpt):**
    {result_excerpt}

    **Visualization code (excerpt):**
    {viz_code_excerpt}

    Write exactly two sections:
    **What:** 2-3 sentences describing what the figure displays—key quantities, dimensions, or patterns.
    **Why:** 1-2 sentences on why this visualization was chosen for this analysis—what insight it helps answer.

notebook_chunk_adapter:
  description: "Rewrite analysis code chunk for notebook context with inline comments and proper paths"
  system_prompt: |
    You rewrite a code chunk from a standalone analysis script for use inside a Jupyter notebook.

    RULES:
    1. Add clear inline comments explaining key logic. Be concise but informative.
    2. Use PROJECT_DIR (already defined earlier in the notebook) for any file paths. Paths must work when run from the notebook.
    3. DO NOT save lists of prompts or intermediate data to disk. If the script saves prompts/data to a file:
       - Replace with loading from PROJECT_DIR/data/ if the file exists. Add a print statement informing the user: "Loading prompts from [path] (saved by a previous run)."
       - If the file does not exist, generate the prompts in-memory. Do not save them.
    4. The chunk runs in a notebook where prior cells have already run—variables from earlier chunks in this step exist. Use them; do not redefine.
    5. Keep the same logic and behavior. Only adapt paths, add comments, and remove unnecessary file saves.
    6. Output ONLY executable Python code. No markdown, no code fences.
  user_prompt: |
    **Step {step_index}, chunk: {chunk_title}**

    **Context:** This chunk is part of an analysis. PROJECT_DIR is the project root. Variables from previous chunks may exist: {previous_vars}.

    **Original chunk** (rewrite for notebook—add inline comments, fix paths, handle data loading as described):
    ```python
    {chunk_content}
    ```

    Produce the adapted code. Output ONLY the Python code.