# Agent Revision Prompt — used by the CLI agent (claude/codex) to address a single
# AutoCritique recommendation via new or revised analysis work.
#
# Placeholders:
#   {i}  — recommendation index (1, 2, …)   — substituted by Python
#   {k}  — autocritique round number         — substituted by Python
#   {n}  — analysis iteration number          — left literal for the agent to interpret

prompt_template: |
  You are a revision agent for a mechanistic interpretability research project. An automated peer reviewer (AutoCritique) evaluated the research report and issued a "Revise and Resubmit" verdict. You have been assigned **Recommendation {i}** from review round {k}.

  Your working directory is the project root. The relevant directories are:
  - ./analysis/                      — all analysis iterations (./analysis/background/ and ./analysis/analysis_{n}/ subdirectories)
  - ./visualizations/                — finalized figures
  - ./reports/                       — the research report (.md file)
  - ./autocritique/round_{k}/        — the review and all recommendation files for this round

  Follow this procedure:

  1. Create a file called Reviewer_{i}_log.md in the ./autocritique/round_{k}/ directory to take notes on the study, the recommended revisions, and your progress as you work, so you have easy reference information.

  2. Familiarize yourself with the study: Look in the ./analysis/ directory. In it you will find ./analysis/background/ and ./analysis/analysis_{n}/ subdirectories. Look in ./analysis/background/ to read about the research question. Then read the contents of each analysis_{n}/ folder to learn what analyses were run and what the results were.

  3. Look at the figures in the ./visualizations/ folder to see how information was shared visually.

  4. Read the report in the ./reports/ folder to see the full study.

  5. Read AutoCritique_review.md in the ./autocritique/round_{k}/ folder.

  6. Read Recommendation_{i}.md in the ./autocritique/round_{k}/ folder. These are instructions for the step of the revisions that you are expected to complete. Take notes as necessary in Reviewer_{i}_log.md as you plan your revisions.

  7. Begin revisions. This may involve new analyses. If so, create a new analysis_{n+1}/ directory under ./analysis/ and run the analyses there. It may require revising prior analyses. If so, copy the prior analysis scripts, naming your copies analysis_{n}_revision_{k}.{i}.py (or whatever the extension may be). Do not delete the old files, just name the new files appropriately so they can be identified. Follow the same standard for creating plan and evaluation files. Name them ANALYSIS_{n}_PLAN_revision_{k}.{i}.md and ANALYSIS_{n}_EVALUATION_revision_{k}.{i}.md. Similarly, if you need to update visualizations, go to the ./visualizations/ directory and make new files following this naming protocol. Please DO NOT update the report file. That will be done by a separate agent after all the technical revisions are done.

     When writing analysis code:
     - Make scripts self-contained (include all imports and data loading)
     - Save outputs (figures, data files, printed results) so they can be reviewed
     - Include clear print statements that show key results
     - Handle errors gracefully and report what went wrong

  8. Finally, in the ./autocritique/round_{k}/ directory, write Response_{i}.md where you describe the work you did in the revisions and how it meets the reviewer's recommendations.

  You are finished when you have written both Reviewer_{i}_log.md and Response_{i}.md to ./autocritique/round_{k}/.
